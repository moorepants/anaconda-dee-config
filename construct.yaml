name: tudelft-conda
version: v2026.01.dev
company: Delft University of Technology
installer_type: all
# NOTE : The following two settings write a condarc file to the installation
# directory to ensure that the default channel for creating new environments or
# installing extra packages is only Conda Forge.
write_condarc: true
conda_default_channels:
  - conda-forge
  - nodefaults
# Ensure that the path lengths are checked on Windows because pytorch can
# create paths longer than 256 characters (see:
# https://github.com/conda/constructor/issues/1022):
check_path_length: true
# NOTE : During the installation build, packages will be retrieved from the
# following channels:
channels:
  - conda-forge
